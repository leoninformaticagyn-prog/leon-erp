<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{font-family:Arial;margin:0;background:#f4f6fa}

header{background:black;color:white;padding:15px;text-align:center}

nav{display:flex;flex-wrap:wrap;gap:10px;padding:10px;justify-content:center;background:#222}

nav button{padding:10px;border:none;border-radius:5px;cursor:pointer}

section{display:none;padding:20px}

section.active{display:block}

input,select{padding:8px;margin:5px}

table{width:100%;border-collapse:collapse;background:white}

th,td{border:1px solid #ddd;padding:8px}

#login{text-align:center;margin-top:120px}

#sugestoes{
background:white;
border:1px solid #ccc;
width:250px;
position:absolute
}

#sugestoes div{
padding:5px;
cursor:pointer
}

#sugestoes div:hover{
background:#eee
}

</style>

</head>

<body>

<div id="login">

<h2>Leon Vendas</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="app" style="display:none">

<header>

<h2>Leon Vendas PRO</h2>

</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('lojas')">Lojas</button>
<button onclick="show('modelos')">Modelos</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('vendas')">Vendas</button>
<button onclick="show('receber')">Contas a Receber</button>
<button onclick="show('cancelamentos')">Cancelamentos</button>
<button onclick="backup()">Backup</button>
<button onclick="importar()">Importar</button>
<button onclick="exportar()">Exportar CSV</button>
<button onclick="logout()">Sair</button>

</nav>

<section id="dashboard" class="active">

<h3>Caixa</h3>
<div id="caixa"></div>

<h3>Lucro</h3>
<div id="lucro"></div>

<h3>Milhas acumuladas</h3>
<div id="milhas"></div>

<h3>Estoque por modelo</h3>
<div id="estoqueModelo"></div>

<h3>Lucro por modelo</h3>
<div id="lucroModelo"></div>

</section>

<section id="vendas">

<h3>Registrar venda</h3>

<select id="vendaLoja"></select>

<input id="comprador" placeholder="Comprador">

<input id="codigoVenda" placeholder="IMEI" onkeyup="buscarIMEI()">

<div id="sugestoes"></div>

<input id="valorVenda" placeholder="Valor">

<select id="forma">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
<option>Transferência</option>
<option>Prazo</option>
</select>

<select id="status">
<option>Recebido</option>
<option>Pendente</option>
</select>

<button onclick="vender()">Registrar venda</button>

</section>

<script>

function buscarIMEI(){

let termo=codigoVenda.value

sugestoes.innerHTML=""

estoque.filter(p=>p.codigo.includes(termo))

.forEach(p=>{

sugestoes.innerHTML+=`<div onclick="selecionarIMEI('${p.codigo}')">${p.codigo}</div>`

})

}

function selecionarIMEI(c){

codigoVenda.value=c

sugestoes.innerHTML=""

}

function dashboard(){

let caixa=0
let lucro=0
let milhas=0

let contagem={}
let lucroM={}

vendas.forEach(v=>{

if(v.status==="Recebido") caixa+=v.valor

lucro+=v.lucro

if(!lucroM[v.modelo]) lucroM[v.modelo]=0

lucroM[v.modelo]+=v.lucro

})

estoque.forEach(p=>{

milhas+=p.milhas

if(!contagem[p.modelo]) contagem[p.modelo]=0

contagem[p.modelo]++

})

caixa.innerHTML="R$ "+caixa

lucro.innerHTML="R$ "+lucro

milhas.innerHTML=milhas+" pontos"

estoqueModelo.innerHTML=""

for(let m in contagem){

estoqueModelo.innerHTML+=m+" — "+contagem[m]+"<br>"

}

lucroModelo.innerHTML=""

for(let m in lucroM){

lucroModelo.innerHTML+=m+" — "+lucroM[m]+"<br>"

}

}

</script>

</body>
</html>
