<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas Cloud</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyADPuE6CYEKQOjgJH4RYcNMjzMKiZoSnGU",
authDomain: "leon-vendas-ac514.firebaseapp.com",
projectId: "leon-vendas-ac514",
storageBucket: "leon-vendas-ac514.firebasestorage.app",
messagingSenderId: "537113092633",
appId: "1:537113092633:web:1af34305a5beffc05d0088"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db
window.collection=collection
window.addDoc=addDoc
window.getDocs=getDocs
window.deleteDoc=deleteDoc
window.doc=doc

</script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa
}

header{
background:black;
color:white;
padding:15px;
text-align:center
}

nav{
display:flex;
gap:10px;
padding:10px;
justify-content:center;
background:#222
}

nav button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer
}

section{
display:none;
padding:20px
}

section.active{
display:block
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px
}

input,select{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<header>

<h2>Leon Vendas Cloud</h2>

</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('modelos')">Modelos</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('scanner')">Scanner</button>
<button onclick="show('vendas')">Vendas</button>

</nav>

<section id="dashboard" class="active">

<h3>Estoque por modelo</h3>

<div id="painelModelos"></div>

</section>

<section id="modelos">

<h3>Criar Modelo</h3>

<input id="modelo" placeholder="Modelo">
<input id="capacidade" placeholder="Capacidade">
<input id="cor" placeholder="Cor">

<button onclick="criarModelo()">Salvar</button>

<div id="listaModelos"></div>

</section>

<section id="estoque">

<h3>Estoque</h3>

<table>

<thead>

<tr>
<th>Modelo</th>
<th>Cap</th>
<th>Cor</th>
<th>IMEI</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tabelaEstoque"></tbody>

</table>

</section>

<section id="scanner">

<h3>Scanner IMEI</h3>

<select id="modeloScanner"></select>

<div id="reader"></div>

<button onclick="startScanner()">Iniciar</button>

</section>

<section id="vendas">

<h3>Registrar Venda</h3>

<input id="imeiVenda" placeholder="IMEI">
<input id="valorVenda" placeholder="Valor">

<button onclick="registrarVenda()">Registrar</button>

</section>

<script>

let scanner

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

async function criarModelo(){

let modelo=document.getElementById("modelo").value
let cap=document.getElementById("capacidade").value
let cor=document.getElementById("cor").value

await addDoc(collection(db,"modelos"),{
modelo,
cap,
cor
})

alert("modelo criado")

carregarModelos()

}

async function carregarModelos(){

let select=document.getElementById("modeloScanner")
let lista=document.getElementById("listaModelos")

select.innerHTML=""
lista.innerHTML=""

const query=await getDocs(collection(db,"modelos"))

query.forEach(doc=>{

let m=doc.data()

select.innerHTML+=`<option value="${m.modelo}|${m.cap}|${m.cor}">
${m.modelo} ${m.cap} ${m.cor}
</option>`

lista.innerHTML+=`<div>${m.modelo} ${m.cap} ${m.cor}</div>`

})

}

function startScanner(){

let dados=document.getElementById("modeloScanner").value

let partes=dados.split("|")

let modelo=partes[0]
let cap=partes[1]
let cor=partes[2]

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

async (decodedText)=>{

if(!decodedText.startsWith("35")) return
if(decodedText.length!==15) return

await addDoc(collection(db,"estoque"),{

modelo,
cap,
cor,
imei:decodedText,
status:"Estoque"

})

alert("IMEI cadastrado")

}

)

}

async function carregarEstoque(){

let tabela=document.getElementById("tabelaEstoque")

tabela.innerHTML=""

const query=await getDocs(collection(db,"estoque"))

query.forEach(doc=>{

let p=doc.data()

tabela.innerHTML+=`
<tr>
<td>${p.modelo}</td>
<td>${p.cap}</td>
<td>${p.cor}</td>
<td>${p.imei}</td>
<td>${p.status}</td>
</tr>
`

})

}

async function registrarVenda(){

let imei=document.getElementById("imeiVenda").value
let valor=document.getElementById("valorVenda").value

await addDoc(collection(db,"vendas"),{

imei,
valor,
data:new Date()

})

alert("venda concluida com sucesso")

}

carregarModelos()
carregarEstoque()

</script>

</body>
</html>
