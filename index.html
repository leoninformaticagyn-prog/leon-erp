<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas PRO</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div id="login">

<h2>Leon Vendas</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="app" style="display:none">

<header>
<h2>Leon Vendas PRO</h2>
</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('lojas')">Lojas</button>
<button onclick="show('modelos')">Modelos</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('vendas')">Vendas</button>
<button onclick="show('receber')">Contas a Receber</button>
<button onclick="show('cancelamentos')">Cancelamentos</button>
<button onclick="logout()">Sair</button>

</nav>

<section id="dashboard"></section>
<section id="lojas"></section>
<section id="modelos"></section>
<section id="estoque"></section>
<section id="vendas"></section>
<section id="receber"></section>
<section id="cancelamentos"></section>

</div>

<script src="app.js"></script>

</body>
</html>
