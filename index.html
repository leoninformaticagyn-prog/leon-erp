<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa
}

header{
background:black;
color:white;
padding:15px;
text-align:center
}

nav{
display:flex;
gap:10px;
padding:10px;
justify-content:center;
background:#222
}

nav button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer
}

section{
display:none;
padding:20px
}

section.active{
display:block
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px
}

input,select,textarea{
padding:8px;
margin:5px;
}

#loginScreen{
width:100%;
padding:20px;
text-align:center;
margin-top:40px;
}

.caixaBox{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
}

</style>

</head>

<body>

<div id="loginScreen">

<h2>Login</h2>

<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="app" style="display:none;">

<header>
<h2>Leon Vendas</h2>
</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clientes')">Clientes</button>
<button onclick="show('modelos')">Modelos</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('scanner')">Scanner</button>
<button onclick="show('vendas')">Vendas</button>
<button onclick="show('cancelamentos')">Cancelamentos</button>

</nav>

<section id="dashboard" class="active">

<div class="caixaBox">

<h3>CAIXA DE HOJE</h3>

<div id="valorHoje"></div>
<div id="qtdHoje"></div>

</div>

<h3>Estoque por modelo</h3>

<div id="painelModelos"></div>

</section>

<section id="clientes">

<h3>Clientes (Lojas)</h3>

<input id="clienteNome" placeholder="Nome da loja">

<button onclick="salvarCliente()">Salvar</button>

<div id="listaClientes"></div>

</section>

<section id="modelos">

<h3>Criar Modelo</h3>

<input id="modelo" placeholder="Modelo">
<input id="capacidade" placeholder="Capacidade">
<input id="cor" placeholder="Cor">

<button onclick="criarModelo()">Salvar</button>

<div id="listaModelos"></div>

</section>

<section id="estoque">

<h3>Estoque</h3>

<table>

<thead>
<tr>
<th>Modelo</th>
<th>Cap</th>
<th>Cor</th>
<th>IMEI</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaEstoque"></tbody>

</table>

</section>

<section id="scanner">

<h3>Scanner IMEI</h3>

<select id="modeloScanner"></select>

<div id="reader"></div>

<button onclick="startScanner()">Iniciar</button>

</section>

<section id="vendas">

<h3>Registrar Venda</h3>

<select id="clienteVenda"></select>

<input id="compradorVenda" placeholder="Comprador">

<input id="imeiVenda" placeholder="Buscar IMEI" onkeyup="buscarImei()">

<div id="resultadoBusca"></div>

<input id="valorVenda" placeholder="Valor">

<button onclick="registrarVenda()">Registrar</button>

<h3>Histórico de vendas</h3>

<table>

<thead>
<tr>
<th>Loja</th>
<th>Comprador</th>
<th>IMEI</th>
<th>Valor</th>
<th>Data</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaVendas"></tbody>

</table>

</section>

<section id="cancelamentos">

<h3>Histórico de Cancelamentos</h3>

<table>

<thead>
<tr>
<th>Loja</th>
<th>Comprador</th>
<th>IMEI</th>
<th>Valor</th>
<th>Venda</th>
<th>Cancelamento</th>
<th>Motivo</th>
</tr>
</thead>

<tbody id="tabelaCancelamentos"></tbody>

</table>

</section>

</div>

<script>

let estoque = JSON.parse(localStorage.getItem("estoque")||"[]")
let modelos = JSON.parse(localStorage.getItem("modelos")||"[]")
let clientes = JSON.parse(localStorage.getItem("clientes")||"[]")
let vendas = JSON.parse(localStorage.getItem("vendas")||"[]")
let cancelamentos = JSON.parse(localStorage.getItem("cancelamentos")||"[]")

function salvarDados(){

localStorage.setItem("estoque",JSON.stringify(estoque))
localStorage.setItem("modelos",JSON.stringify(modelos))
localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("vendas",JSON.stringify(vendas))
localStorage.setItem("cancelamentos",JSON.stringify(cancelamentos))

}

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

if(user==="Leon" && pass==="Leon@017"){

document.getElementById("loginScreen").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("login incorreto")

}

}

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function salvarCliente(){

let nome=document.getElementById("clienteNome").value

clientes.push({nome})

salvarDados()

carregarClientes()

}

function carregarClientes(){

let lista=document.getElementById("listaClientes")
let select=document.getElementById("clienteVenda")

lista.innerHTML=""
select.innerHTML=""

clientes.forEach(c=>{

lista.innerHTML+=`<div>${c.nome}</div>`
select.innerHTML+=`<option value="${c.nome}">${c.nome}</option>`

})

}

function registrarVenda(){

let imei=document.getElementById("imeiVenda").value
let cliente=document.getElementById("clienteVenda").value
let comprador=document.getElementById("compradorVenda").value
let valor=document.getElementById("valorVenda").value

let aparelho = estoque.find(p=>p.imei===imei)

if(!aparelho){
alert("IMEI não encontrado")
return
}

valor=parseFloat(valor.replace(".","").replace(",","."))
valor=valor.toLocaleString("pt-BR",{minimumFractionDigits:2})

vendas.push({
cliente,
comprador,
imei,
valor,
data:new Date()
})

estoque = estoque.filter(p=>p.imei!==imei)

salvarDados()

carregarEstoque()
carregarVendas()
carregarDashboard()

}

function carregarVendas(){

let tabela=document.getElementById("tabelaVendas")

tabela.innerHTML=""

vendas.forEach((v,index)=>{

tabela.innerHTML+=`
<tr>
<td>${v.cliente}</td>
<td>${v.comprador}</td>
<td>${v.imei}</td>
<td>${v.valor}</td>
<td>${new Date(v.data).toLocaleString()}</td>
<td><button onclick="cancelarVenda(${index})">Cancelar</button></td>
</tr>
`

})

}

function cancelarVenda(index){

let confirmar = confirm("Registrar cancelamento desta venda?")

if(!confirmar) return

let motivo = prompt("Informe o motivo do cancelamento")

let venda=vendas[index]

cancelamentos.push({
cliente:venda.cliente,
comprador:venda.comprador,
imei:venda.imei,
valor:venda.valor,
dataVenda:venda.data,
dataCancelamento:new Date(),
motivo
})

estoque.push({imei:venda.imei})

vendas.splice(index,1)

salvarDados()

carregarEstoque()
carregarVendas()
carregarCancelamentos()
carregarDashboard()

}

function carregarCancelamentos(){

let tabela=document.getElementById("tabelaCancelamentos")

tabela.innerHTML=""

cancelamentos.forEach(c=>{

tabela.innerHTML+=`
<tr>
<td>${c.cliente}</td>
<td>${c.comprador}</td>
<td>${c.imei}</td>
<td>${c.valor}</td>
<td>${new Date(c.dataVenda).toLocaleString()}</td>
<td>${new Date(c.dataCancelamento).toLocaleString()}</td>
<td>${c.motivo}</td>
</tr>
`

})

}

function carregarDashboard(){

let hoje = new Date().toLocaleDateString()

let total=0
let qtd=0

vendas.forEach(v=>{

let data=new Date(v.data).toLocaleDateString()

if(data===hoje){

let valor=parseFloat(v.valor.replace(".","").replace(",","."))

total+=valor
qtd++

}

})

document.getElementById("valorHoje").innerHTML="Total vendido hoje: R$ "+total.toLocaleString("pt-BR",{minimumFractionDigits:2})
document.getElementById("qtdHoje").innerHTML="Vendas hoje: "+qtd

}

carregarClientes()
carregarVendas()
carregarCancelamentos()
carregarDashboard()

</script>

</body>
</html>
