<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa
}

header{
background:black;
color:white;
padding:15px;
text-align:center
}

nav{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
justify-content:center;
background:#222
}

nav button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer
}

section{
display:none;
padding:20px
}

section.active{
display:block
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px
}

input,select{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<header>
<h2>Leon Vendas PRO</h2>
</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clientes')">Clientes</button>
<button onclick="show('modelos')">Modelos</button>
<button onclick="show('scanner')">Scanner</button>
<button onclick="show('manual')">Adicionar Manual</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('vendas')">Vendas</button>

</nav>

<section id="dashboard" class="active">

<h3>Caixa de Hoje</h3>

<div id="caixa"></div>

</section>

<section id="clientes">

<h3>Cadastrar Loja</h3>

<input id="clienteNome" placeholder="Nome da loja">

<button onclick="salvarCliente()">Salvar</button>

<div id="listaClientes"></div>

</section>

<section id="modelos">

<h3>Criar Modelo</h3>

<input id="modeloNome" placeholder="Modelo">

<button onclick="salvarModelo()">Salvar</button>

<div id="listaModelos"></div>

</section>

<section id="scanner">

<h3>Scanner</h3>

<select id="modeloScanner"></select>

<div id="reader" style="width:300px"></div>

<button onclick="startScanner()">Iniciar</button>

</section>

<section id="manual">

<h3>Adicionar Código Manual</h3>

<select id="modeloManual"></select>

<input id="codigoManual" placeholder="IMEI ou SN">

<button onclick="adicionarManual()">Adicionar</button>

</section>

<section id="estoque">

<h3>Estoque</h3>

<table>

<thead>
<tr>
<th>Modelo</th>
<th>Código</th>
<th>Tipo</th>
</tr>
</thead>

<tbody id="tabelaEstoque"></tbody>

</table>

</section>

<section id="vendas">

<h3>Registrar Venda</h3>

<select id="clienteVenda"></select>

<input id="comprador" placeholder="Comprador">

<input id="codigoVenda" placeholder="IMEI ou SN">

<input id="valorVenda" placeholder="Valor">

<button onclick="registrarVenda()">Registrar</button>

<h3>Histórico</h3>

<table>

<thead>
<tr>
<th>Loja</th>
<th>Código</th>
<th>Valor</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabelaVendas"></tbody>

</table>

</section>

<script>

let db

let request = indexedDB.open("LeonDB",1)

request.onupgradeneeded = function(e){

db = e.target.result

db.createObjectStore("clientes",{keyPath:"id",autoIncrement:true})
db.createObjectStore("modelos",{keyPath:"id",autoIncrement:true})
db.createObjectStore("estoque",{keyPath:"codigo"})
db.createObjectStore("vendas",{keyPath:"id",autoIncrement:true})

}

request.onsuccess=function(e){

db=e.target.result

carregarClientes()
carregarModelos()
carregarEstoque()
carregarVendas()

}

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function salvarCliente(){

let nome=document.getElementById("clienteNome").value

let tx=db.transaction("clientes","readwrite")

tx.objectStore("clientes").add({nome})

carregarClientes()

}

function carregarClientes(){

let lista=document.getElementById("listaClientes")
let select=document.getElementById("clienteVenda")

lista.innerHTML=""
select.innerHTML=""

let tx=db.transaction("clientes")

tx.objectStore("clientes").openCursor().onsuccess=function(e){

let cursor=e.target.result

if(cursor){

lista.innerHTML+=cursor.value.nome+"<br>"

select.innerHTML+=`<option>${cursor.value.nome}</option>`

cursor.continue()

}

}

}

function salvarModelo(){

let nome=document.getElementById("modeloNome").value

let tx=db.transaction("modelos","readwrite")

tx.objectStore("modelos").add({nome})

carregarModelos()

}

function carregarModelos(){

let lista=document.getElementById("listaModelos")
let s1=document.getElementById("modeloScanner")
let s2=document.getElementById("modeloManual")

lista.innerHTML=""
s1.innerHTML=""
s2.innerHTML=""

let tx=db.transaction("modelos")

tx.objectStore("modelos").openCursor().onsuccess=function(e){

let cursor=e.target.result

if(cursor){

lista.innerHTML+=cursor.value.nome+"<br>"

s1.innerHTML+=`<option>${cursor.value.nome}</option>`
s2.innerHTML+=`<option>${cursor.value.nome}</option>`

cursor.continue()

}

}

}

function detectarTipo(codigo){

if(codigo.length==15 && codigo.startsWith("35")) return "IMEI"

if(codigo.length==17) return "SN"

return "DESCONHECIDO"

}

function adicionarManual(){

let modelo=document.getElementById("modeloManual").value
let codigo=document.getElementById("codigoManual").value

let tipo=detectarTipo(codigo)

let tx=db.transaction("estoque","readwrite")

tx.objectStore("estoque").add({codigo,modelo,tipo})

carregarEstoque()

}

function startScanner(){

let modelo=document.getElementById("modeloScanner").value

const scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

(decodedText)=>{

let tipo=detectarTipo(decodedText)

let tx=db.transaction("estoque","readwrite")

tx.objectStore("estoque").add({codigo:decodedText,modelo,tipo})

scanner.stop()

carregarEstoque()

alert("Cadastrado")

}

)

}

function carregarEstoque(){

let tabela=document.getElementById("tabelaEstoque")

tabela.innerHTML=""

let tx=db.transaction("estoque")

tx.objectStore("estoque").openCursor().onsuccess=function(e){

let cursor=e.target.result

if(cursor){

let p=cursor.value

tabela.innerHTML+=`
<tr>
<td>${p.modelo}</td>
<td>${p.codigo}</td>
<td>${p.tipo}</td>
</tr>
`

cursor.continue()

}

}

}

function registrarVenda(){

let codigo=document.getElementById("codigoVenda").value
let cliente=document.getElementById("clienteVenda").value
let comprador=document.getElementById("comprador").value
let valor=document.getElementById("valorVenda").value

let tx=db.transaction(["estoque","vendas"],"readwrite")

tx.objectStore("vendas").add({
codigo,
cliente,
comprador,
valor,
data:new Date()
})

tx.objectStore("estoque").delete(codigo)

carregarVendas()
carregarEstoque()

}

function carregarVendas(){

let tabela=document.getElementById("tabelaVendas")

tabela.innerHTML=""

let tx=db.transaction("vendas")

tx.objectStore("vendas").openCursor().onsuccess=function(e){

let cursor=e.target.result

if(cursor){

let v=cursor.value

tabela.innerHTML+=`
<tr>
<td>${v.cliente}</td>
<td>${v.codigo}</td>
<td>${v.valor}</td>
<td>${new Date(v.data).toLocaleString()}</td>
</tr>
`

cursor.continue()

}

}

}

</script>

</body>
</html>
