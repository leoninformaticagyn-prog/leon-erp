<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa
}

header{
background:black;
color:white;
padding:15px;
text-align:center
}

nav{
display:flex;
gap:10px;
padding:10px;
justify-content:center;
background:#222;
flex-wrap:wrap
}

nav button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer
}

section{
display:none;
padding:20px
}

section.active{
display:block
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px
}

input,select{
padding:8px;
margin:5px;
}

.caixa{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
}

</style>

</head>

<body>

<header>
<h2>Leon Vendas</h2>
</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clientes')">Clientes</button>
<button onclick="show('modelos')">Modelos</button>
<button onclick="show('scanner')">Scanner</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('vendas')">Vendas</button>
<button onclick="show('cancelamentos')">Cancelamentos</button>

</nav>

<section id="dashboard" class="active">

<div class="caixa">

<h3>Caixa de Hoje</h3>

<div id="valorHoje"></div>
<div id="qtdHoje"></div>

</div>

<button onclick="exportarBackup()">Exportar Backup</button>
<input type="file" onchange="importarBackup(event)">

</section>

<section id="clientes">

<h3>Cadastrar Loja</h3>

<input id="clienteNome" placeholder="Nome da loja">

<button onclick="salvarCliente()">Salvar</button>

<div id="listaClientes"></div>

</section>

<section id="modelos">

<h3>Criar Modelo</h3>

<input id="modelo" placeholder="Modelo">
<input id="capacidade" placeholder="Capacidade">
<input id="cor" placeholder="Cor">

<button onclick="criarModelo()">Salvar</button>

<div id="listaModelos"></div>

</section>

<section id="scanner">

<h3>Scanner IMEI</h3>

<select id="modeloScanner"></select>

<div id="reader" style="width:300px"></div>

<button onclick="startScanner()">Iniciar Scanner</button>

</section>

<section id="estoque">

<h3>Estoque</h3>

<table>

<thead>

<tr>
<th>Modelo</th>
<th>Cap</th>
<th>Cor</th>
<th>IMEI</th>
<th>Ação</th>
</tr>

</thead>

<tbody id="tabelaEstoque"></tbody>

</table>

</section>

<section id="vendas">

<h3>Registrar Venda</h3>

<select id="clienteVenda"></select>

<input id="compradorVenda" placeholder="Comprador">

<input id="imeiVenda" placeholder="IMEI">

<input id="valorVenda" placeholder="Valor">

<button onclick="registrarVenda()">Registrar</button>

<h3>Histórico de vendas</h3>

<table>

<thead>
<tr>
<th>Loja</th>
<th>Comprador</th>
<th>IMEI</th>
<th>Valor</th>
<th>Data</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaVendas"></tbody>

</table>

</section>

<section id="cancelamentos">

<h3>Histórico de Cancelamentos</h3>

<table>

<thead>
<tr>
<th>Loja</th>
<th>Comprador</th>
<th>IMEI</th>
<th>Valor</th>
<th>Venda</th>
<th>Cancelamento</th>
<th>Motivo</th>
</tr>
</thead>

<tbody id="tabelaCancelamentos"></tbody>

</table>

</section>

<script>

let estoque = JSON.parse(localStorage.getItem("estoque")||"[]")
let modelos = JSON.parse(localStorage.getItem("modelos")||"[]")
let clientes = JSON.parse(localStorage.getItem("clientes")||"[]")
let vendas = JSON.parse(localStorage.getItem("vendas")||"[]")
let cancelamentos = JSON.parse(localStorage.getItem("cancelamentos")||"[]")

function salvarDados(){

localStorage.setItem("estoque",JSON.stringify(estoque))
localStorage.setItem("modelos",JSON.stringify(modelos))
localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("vendas",JSON.stringify(vendas))
localStorage.setItem("cancelamentos",JSON.stringify(cancelamentos))

}

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function salvarCliente(){

let nome=document.getElementById("clienteNome").value

clientes.push({nome})

salvarDados()

carregarClientes()

}

function carregarClientes(){

let lista=document.getElementById("listaClientes")
let select=document.getElementById("clienteVenda")

lista.innerHTML=""
select.innerHTML=""

clientes.forEach(c=>{

lista.innerHTML+=`<div>${c.nome}</div>`
select.innerHTML+=`<option>${c.nome}</option>`

})

}

function criarModelo(){

let modelo=document.getElementById("modelo").value
let cap=document.getElementById("capacidade").value
let cor=document.getElementById("cor").value

modelos.push({modelo,cap,cor})

salvarDados()

carregarModelos()

}

function carregarModelos(){

let lista=document.getElementById("listaModelos")
let select=document.getElementById("modeloScanner")

lista.innerHTML=""
select.innerHTML=""

modelos.forEach(m=>{

lista.innerHTML+=`<div>${m.modelo} ${m.cap} ${m.cor}</div>`

select.innerHTML+=`<option value="${m.modelo}|${m.cap}|${m.cor}">
${m.modelo} ${m.cap} ${m.cor}
</option>`

})

}

function startScanner(){

let dados=document.getElementById("modeloScanner").value.split("|")

let modelo=dados[0]
let cap=dados[1]
let cor=dados[2]

const scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

(decodedText)=>{

if(decodedText.length!==15)return

estoque.push({modelo,cap,cor,imei:decodedText})

salvarDados()

carregarEstoque()

alert("IMEI cadastrado")

scanner.stop()

}

)

}

function carregarEstoque(){

let tabela=document.getElementById("tabelaEstoque")

tabela.innerHTML=""

estoque.forEach((p,i)=>{

tabela.innerHTML+=`
<tr>
<td>${p.modelo}</td>
<td>${p.cap}</td>
<td>${p.cor}</td>
<td>${p.imei}</td>
<td><button onclick="excluirEstoque(${i})">Excluir</button></td>
</tr>
`

})

}

function excluirEstoque(i){

estoque.splice(i,1)

salvarDados()

carregarEstoque()

}

function registrarVenda(){

let imei=document.getElementById("imeiVenda").value
let cliente=document.getElementById("clienteVenda").value
let comprador=document.getElementById("compradorVenda").value
let valor=document.getElementById("valorVenda").value

vendas.push({cliente,comprador,imei,valor,data:new Date()})

estoque=estoque.filter(p=>p.imei!==imei)

salvarDados()

carregarEstoque()
carregarVendas()
carregarDashboard()

}

function carregarVendas(){

let tabela=document.getElementById("tabelaVendas")

tabela.innerHTML=""

vendas.forEach((v,i)=>{

tabela.innerHTML+=`
<tr>
<td>${v.cliente}</td>
<td>${v.comprador}</td>
<td>${v.imei}</td>
<td>${v.valor}</td>
<td>${new Date(v.data).toLocaleString()}</td>
<td><button onclick="cancelarVenda(${i})">Cancelar</button></td>
</tr>
`

})

}

function cancelarVenda(i){

let confirmar=confirm("Confirmar cancelamento da venda?")

if(!confirmar)return

let motivo=prompt("Motivo do cancelamento")

let venda=vendas[i]

cancelamentos.push({
...venda,
dataCancelamento:new Date(),
motivo
})

estoque.push({imei:venda.imei})

vendas.splice(i,1)

salvarDados()

carregarEstoque()
carregarVendas()
carregarCancelamentos()

}

function carregarCancelamentos(){

let tabela=document.getElementById("tabelaCancelamentos")

tabela.innerHTML=""

cancelamentos.forEach(c=>{

tabela.innerHTML+=`
<tr>
<td>${c.cliente}</td>
<td>${c.comprador}</td>
<td>${c.imei}</td>
<td>${c.valor}</td>
<td>${new Date(c.data).toLocaleString()}</td>
<td>${new Date(c.dataCancelamento).toLocaleString()}</td>
<td>${c.motivo}</td>
</tr>
`

})

}

function carregarDashboard(){

let hoje=new Date().toLocaleDateString()

let total=0
let qtd=0

vendas.forEach(v=>{

let data=new Date(v.data).toLocaleDateString()

if(data===hoje){

total+=parseFloat(v.valor||0)
qtd++

}

})

document.getElementById("valorHoje").innerHTML="Total vendido hoje: R$ "+total
document.getElementById("qtdHoje").innerHTML="Vendas hoje: "+qtd

}

function exportarBackup(){

let dados={estoque,modelos,clientes,vendas,cancelamentos}

let blob=new Blob([JSON.stringify(dados)],{type:"application/json"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="leon_backup.json"

a.click()

}

function importarBackup(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(ev){

let dados=JSON.parse(ev.target.result)

estoque=dados.estoque||[]
modelos=dados.modelos||[]
clientes=dados.clientes||[]
vendas=dados.vendas||[]
cancelamentos=dados.cancelamentos||[]

salvarDados()

location.reload()

}

reader.readAsText(file)

}

carregarClientes()
carregarModelos()
carregarEstoque()
carregarVendas()
carregarCancelamentos()
carregarDashboard()

</script>

</body>
</html>
