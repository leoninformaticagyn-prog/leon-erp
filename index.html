<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa
}

header{
background:black;
color:white;
padding:15px;
text-align:center
}

nav{
display:flex;
gap:10px;
padding:10px;
justify-content:center;
background:#222
}

nav button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer
}

section{
display:none;
padding:20px
}

section.active{
display:block
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px
}

input,select{
padding:8px;
margin:5px;
}

#loginScreen{
width:100%;
padding:20px;
text-align:center;
margin-top:40px;
}

</style>

</head>

<body>

<div id="loginScreen">

<h2>Login</h2>

<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="app" style="display:none;">

<header>

<h2>Leon Vendas</h2>

</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clientes')">Clientes</button>
<button onclick="show('modelos')">Modelos</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('scanner')">Scanner</button>
<button onclick="show('vendas')">Vendas</button>

</nav>

<section id="dashboard" class="active">

<h3>Estoque por modelo</h3>

<div id="painelModelos"></div>

</section>

<section id="clientes">

<h3>Clientes</h3>

<input id="clienteNome" placeholder="Nome">

<button onclick="salvarCliente()">Salvar</button>

<div id="listaClientes"></div>

</section>

<section id="modelos">

<h3>Criar Modelo</h3>

<input id="modelo" placeholder="Modelo">
<input id="capacidade" placeholder="Capacidade">
<input id="cor" placeholder="Cor">

<button onclick="criarModelo()">Salvar</button>

<div id="listaModelos"></div>

</section>

<section id="estoque">

<h3>Estoque</h3>

<table>

<thead>
<tr>
<th>Modelo</th>
<th>Cap</th>
<th>Cor</th>
<th>IMEI</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaEstoque"></tbody>

</table>

</section>

<section id="scanner">

<h3>Scanner IMEI</h3>

<select id="modeloScanner"></select>

<div id="reader"></div>

<button onclick="startScanner()">Iniciar</button>

</section>

<section id="vendas">

<h3>Registrar Venda</h3>

<select id="clienteVenda"></select>

<input id="imeiVenda" placeholder="Buscar IMEI" onkeyup="buscarImei()">

<div id="resultadoBusca"></div>

<input id="valorVenda" placeholder="Valor">

<button onclick="registrarVenda()">Registrar</button>

<h3>Histórico de vendas</h3>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>IMEI</th>
<th>Valor</th>
<th>Data</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaVendas"></tbody>

</table>

</section>

</div>

<script>

let estoque = JSON.parse(localStorage.getItem("estoque")||"[]")
let modelos = JSON.parse(localStorage.getItem("modelos")||"[]")
let clientes = JSON.parse(localStorage.getItem("clientes")||"[]")
let vendas = JSON.parse(localStorage.getItem("vendas")||"[]")

let scanner

function salvarDados(){

localStorage.setItem("estoque",JSON.stringify(estoque))
localStorage.setItem("modelos",JSON.stringify(modelos))
localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("vendas",JSON.stringify(vendas))

}

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

if(user==="Leon" && pass==="Leon@017"){

document.getElementById("loginScreen").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("login incorreto")

}

}

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function salvarCliente(){

let nome=document.getElementById("clienteNome").value

clientes.push({nome})

salvarDados()

carregarClientes()

}

function carregarClientes(){

let lista=document.getElementById("listaClientes")
let select=document.getElementById("clienteVenda")

lista.innerHTML=""
select.innerHTML=""

clientes.forEach(c=>{

lista.innerHTML+=`<div>${c.nome}</div>`
select.innerHTML+=`<option value="${c.nome}">${c.nome}</option>`

})

}

function criarModelo(){

let modelo=document.getElementById("modelo").value
let cap=document.getElementById("capacidade").value
let cor=document.getElementById("cor").value

modelos.push({modelo,cap,cor})

salvarDados()

carregarModelos()

}

function carregarModelos(){

let select=document.getElementById("modeloScanner")
let lista=document.getElementById("listaModelos")

select.innerHTML=""
lista.innerHTML=""

modelos.forEach(m=>{

select.innerHTML+=`<option value="${m.modelo}|${m.cap}|${m.cor}">
${m.modelo} ${m.cap} ${m.cor}
</option>`

lista.innerHTML+=`<div>${m.modelo} ${m.cap} ${m.cor}</div>`

})

}

function startScanner(){

let dados=document.getElementById("modeloScanner").value

let partes=dados.split("|")

let modelo=partes[0]
let cap=partes[1]
let cor=partes[2]

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

(decodedText)=>{

if(!decodedText.startsWith("35")) return
if(decodedText.length!==15) return

if(estoque.find(p=>p.imei===decodedText)){

alert("IMEI já cadastrado")

scanner.stop()

return

}

estoque.push({
modelo,
cap,
cor,
imei:decodedText
})

salvarDados()

carregarEstoque()
carregarDashboard()

alert("IMEI cadastrado")

scanner.stop()

})

}

function carregarEstoque(){

let tabela=document.getElementById("tabelaEstoque")

tabela.innerHTML=""

estoque.forEach((p,index)=>{

tabela.innerHTML+=`
<tr>
<td>${p.modelo}</td>
<td>${p.cap}</td>
<td>${p.cor}</td>
<td>${p.imei}</td>
<td><button onclick="excluirEstoque(${index})">Excluir</button></td>
</tr>
`

})

}

function excluirEstoque(index){

if(!confirm("Excluir aparelho?")) return

estoque.splice(index,1)

salvarDados()

carregarEstoque()
carregarDashboard()

}

function buscarImei(){

let busca=document.getElementById("imeiVenda").value

let resultado=document.getElementById("resultadoBusca")

resultado.innerHTML=""

if(busca.length<3) return

estoque.forEach(p=>{

if(p.imei.includes(busca)){

resultado.innerHTML+=`
<div onclick="selecionarImei('${p.imei}')">
${p.modelo} ${p.cap} ${p.cor} - ${p.imei}
</div>
`

}

})

}

function selecionarImei(imei){

document.getElementById("imeiVenda").value=imei
document.getElementById("resultadoBusca").innerHTML=""

}

function registrarVenda(){

let imei=document.getElementById("imeiVenda").value
let cliente=document.getElementById("clienteVenda").value
let valor=document.getElementById("valorVenda").value

let aparelho = estoque.find(p=>p.imei===imei)

if(!aparelho){
alert("IMEI não encontrado")
return
}

valor=parseFloat(valor.replace(".","").replace(",","."))

valor=valor.toLocaleString("pt-BR",{minimumFractionDigits:2})

vendas.push({
cliente,
imei,
modelo:aparelho.modelo,
cap:aparelho.cap,
cor:aparelho.cor,
valor,
data:new Date()
})

estoque = estoque.filter(p=>p.imei!==imei)

salvarDados()

carregarEstoque()
carregarVendas()
carregarDashboard()

alert("venda concluida com sucesso")

}

function carregarVendas(){

let tabela=document.getElementById("tabelaVendas")

tabela.innerHTML=""

vendas.forEach((v,index)=>{

tabela.innerHTML+=`
<tr>
<td>${v.cliente}</td>
<td>${v.imei}</td>
<td>${v.valor}</td>
<td>${new Date(v.data).toLocaleDateString()}</td>
<td><button onclick="cancelarVenda(${index})">Cancelar</button></td>
</tr>
`

})

}

function cancelarVenda(index){

let venda=vendas[index]

estoque.push({
modelo:venda.modelo,
cap:venda.cap,
cor:venda.cor,
imei:venda.imei
})

vendas.splice(index,1)

salvarDados()

carregarEstoque()
carregarVendas()
carregarDashboard()

}

function carregarDashboard(){

let painel=document.getElementById("painelModelos")

let contagem={}

estoque.forEach(p=>{

if(!contagem[p.modelo]){
contagem[p.modelo]=0
}

contagem[p.modelo]++

})

let html=""

for(let modelo in contagem){

html+=modelo+" — "+contagem[modelo]+" aparelhos<br>"

}

painel.innerHTML=html

}

carregarClientes()
carregarModelos()
carregarEstoque()
carregarVendas()
carregarDashboard()

</script>

</body>
</html>
