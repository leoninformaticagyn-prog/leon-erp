<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas PRO</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div id="login">

<h2>Leon Vendas</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="app" style="display:none">

<header>

<h2>Leon Vendas PRO</h2>

</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('vendas')">Vendas</button>
<button onclick="show('receber')">Contas a Receber</button>
<button onclick="logout()">Sair</button>

</nav>

<section id="dashboard" class="active">

<h3>Caixa</h3>
<div id="caixa"></div>

<h3>Lucro</h3>
<div id="lucro"></div>

<h3>Milhas</h3>
<div id="milhas"></div>

</section>

<section id="estoque">

<h3>Cadastrar aparelho</h3>

<input id="modelo" placeholder="Modelo">
<input id="cap" placeholder="Capacidade">
<input id="cor" placeholder="Cor">

<input id="codigo" placeholder="IMEI">

<!-- SCANNER -->

<div id="reader" style="width:320px;margin-top:15px;"></div>

<input id="custo" placeholder="Custo">
<input id="milhasAdd" placeholder="Milhas">

<button onclick="addEstoque()">Adicionar</button>

<h3>Buscar</h3>

<input id="busca" onkeyup="buscar()">

<table>

<thead>

<tr>
<th>Modelo</th>
<th>Cap</th>
<th>Cor</th>
<th>IMEI</th>
<th>Custo</th>
<th>Milhas</th>
</tr>

</thead>

<tbody id="tabelaEstoque"></tbody>

</table>

</section>

<section id="vendas">

<h3>Registrar venda</h3>

<input id="cliente" placeholder="Cliente">
<input id="codigoVenda" placeholder="IMEI">
<input id="valorVenda" placeholder="Valor">

<select id="status">
<option>Recebido</option>
<option>Pendente</option>
</select>

<button onclick="vender()">Registrar venda</button>

<table>

<thead>

<tr>
<th>Cliente</th>
<th>IMEI</th>
<th>Valor</th>
<th>Lucro</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tabelaVendas"></tbody>

</table>

</section>

<section id="receber">

<h3>Contas a receber</h3>

<table>

<thead>

<tr>
<th>Cliente</th>
<th>Valor</th>
<th>Ação</th>
</tr>

</thead>

<tbody id="tabelaReceber"></tbody>

</table>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
