<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas Cloud</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyADPuE6CYEKQOjgJH4RYcNMjzMKiZoSnGU",
authDomain: "leon-vendas-ac514.firebaseapp.com",
projectId: "leon-vendas-ac514",
storageBucket: "leon-vendas-ac514.firebasestorage.app",
messagingSenderId: "537113092633",
appId: "1:537113092633:web:1af34305a5beffc05d0088"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db
window.collection=collection
window.addDoc=addDoc
window.getDocs=getDocs

</script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa
}

header{
background:black;
color:white;
padding:15px;
text-align:center
}

nav{
display:flex;
gap:10px;
padding:10px;
justify-content:center;
background:#222
}

nav button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer
}

section{
display:none;
padding:20px
}

section.active{
display:block
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px
}

input,select{
padding:8px;
margin:5px;
}

#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

</style>

</head>

<body>

<div id="loginScreen">

<h2>Login</h2>

<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">

<button onclick="fazerLogin()">Entrar</button>

</div>

<header>

<h2>Leon Vendas Cloud</h2>

</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clientes')">Clientes</button>
<button onclick="show('modelos')">Modelos</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('scanner')">Scanner</button>
<button onclick="show('vendas')">Vendas</button>

</nav>

<section id="dashboard" class="active">

<h3>Estoque por modelo</h3>

<div id="painelModelos"></div>

</section>

<section id="clientes">

<h3>Clientes</h3>

<input id="clienteNome" placeholder="Nome">

<button onclick="salvarCliente()">Salvar</button>

<div id="listaClientes"></div>

</section>

<section id="modelos">

<h3>Criar Modelo</h3>

<input id="modelo" placeholder="Modelo">
<input id="capacidade" placeholder="Capacidade">
<input id="cor" placeholder="Cor">

<button onclick="criarModelo()">Salvar</button>

<div id="listaModelos"></div>

</section>

<section id="estoque">

<h3>Estoque</h3>

<table>

<thead>

<tr>
<th>Modelo</th>
<th>Cap</th>
<th>Cor</th>
<th>IMEI</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tabelaEstoque"></tbody>

</table>

</section>

<section id="scanner">

<h3>Scanner IMEI</h3>

<select id="modeloScanner"></select>

<div id="reader"></div>

<button onclick="startScanner()">Iniciar</button>

</section>

<section id="vendas">

<h3>Registrar Venda</h3>

<input id="imeiVenda" placeholder="Buscar IMEI" onkeyup="buscarImeiVenda()">
<div id="resultadoBusca"></div>

<input id="valorVenda" placeholder="Valor">

<button onclick="registrarVenda()">Registrar</button>

</section>

<script>

let scanner

function fazerLogin(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

if(user==="Leon" && pass==="Leon@017"){

document.getElementById("loginScreen").style.display="none"

}else{

alert("login incorreto")

}

}

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

async function salvarCliente(){

let nome=document.getElementById("clienteNome").value

await addDoc(collection(db,"clientes"),{nome})

alert("cliente salvo")

carregarClientes()

}

async function carregarClientes(){

let lista=document.getElementById("listaClientes")

lista.innerHTML=""

const query=await getDocs(collection(db,"clientes"))

query.forEach(doc=>{

let c=doc.data()

lista.innerHTML+=`<div>${c.nome}</div>`

})

}

async function criarModelo(){

let modelo=document.getElementById("modelo").value
let cap=document.getElementById("capacidade").value
let cor=document.getElementById("cor").value

await addDoc(collection(db,"modelos"),{modelo,cap,cor})

alert("modelo criado")

carregarModelos()

}

async function carregarModelos(){

let select=document.getElementById("modeloScanner")
let lista=document.getElementById("listaModelos")

select.innerHTML=""
lista.innerHTML=""

const query=await getDocs(collection(db,"modelos"))

query.forEach(doc=>{

let m=doc.data()

select.innerHTML+=`<option value="${m.modelo}|${m.cap}|${m.cor}">
${m.modelo} ${m.cap} ${m.cor}
</option>`

lista.innerHTML+=`<div>${m.modelo} ${m.cap} ${m.cor}</div>`

})

}

function startScanner(){

let dados=document.getElementById("modeloScanner").value

let partes=dados.split("|")

let modelo=partes[0]
let cap=partes[1]
let cor=partes[2]

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

async (decodedText)=>{

if(!decodedText.startsWith("35")) return
if(decodedText.length!==15) return

const query=await getDocs(collection(db,"estoque"))

let duplicado=false

query.forEach(doc=>{

let p=doc.data()

if(p.imei===decodedText){
duplicado=true
}

})

if(duplicado){
alert("IMEI já cadastrado")
return
}

await addDoc(collection(db,"estoque"),{

modelo,
cap,
cor,
imei:decodedText,
status:"Estoque"

})

alert("IMEI cadastrado")

carregarEstoque()
carregarDashboard()

}

)

}

async function carregarEstoque(){

let tabela=document.getElementById("tabelaEstoque")

tabela.innerHTML=""

const query=await getDocs(collection(db,"estoque"))

query.forEach(doc=>{

let p=doc.data()

tabela.innerHTML+=`
<tr>
<td>${p.modelo}</td>
<td>${p.cap}</td>
<td>${p.cor}</td>
<td>${p.imei}</td>
<td>${p.status}</td>
</tr>
`

})

}

async function buscarImeiVenda(){

let busca=document.getElementById("imeiVenda").value

let resultado=document.getElementById("resultadoBusca")

resultado.innerHTML=""

if(busca.length<3) return

const query=await getDocs(collection(db,"estoque"))

query.forEach(doc=>{

let p=doc.data()

if(p.imei.includes(busca) && p.status==="Estoque"){

resultado.innerHTML+=`
<div onclick="selecionarImei('${p.imei}')">
${p.modelo} ${p.cap} ${p.cor} - ${p.imei}
</div>
`

}

})

}

function selecionarImei(imei){

document.getElementById("imeiVenda").value=imei

document.getElementById("resultadoBusca").innerHTML=""

}

async function registrarVenda(){

let imei=document.getElementById("imeiVenda").value
let valor=document.getElementById("valorVenda").value

valor=parseFloat(valor.replace(".","").replace(",","."))

valor=valor.toLocaleString("pt-BR",{minimumFractionDigits:2})

await addDoc(collection(db,"vendas"),{

imei,
valor,
data:new Date()

})

alert("venda concluida com sucesso")

}

async function carregarDashboard(){

let painel=document.getElementById("painelModelos")

let contagem={}

const query=await getDocs(collection(db,"estoque"))

query.forEach(doc=>{

let p=doc.data()

if(!contagem[p.modelo]){
contagem[p.modelo]=0
}

contagem[p.modelo]++

})

let html=""

for(let modelo in contagem){

html+=modelo+" — "+contagem[modelo]+" aparelhos<br>"

}

painel.innerHTML=html

}

carregarClientes()
carregarModelos()
carregarEstoque()
carregarDashboard()

</script>

</body>
</html>
