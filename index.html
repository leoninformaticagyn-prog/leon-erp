<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Vendas</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa
}

header{
background:#000;
color:white;
padding:16px;
text-align:center
}

nav{
background:#1f1f1f;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
padding:10px
}

nav button{
padding:10px;
border:none;
border-radius:6px;
background:white;
cursor:pointer
}

section{
display:none;
padding:18px
}

section.active{
display:block
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px
}

input,textarea{
padding:8px;
margin:4px 0;
width:100%;
max-width:420px
}

.card{
background:white;
padding:12px;
border-radius:8px;
margin:10px 0
}

.login{
max-width:360px;
margin:120px auto;
background:white;
padding:20px;
border-radius:10px
}

#reader{
width:300px
}

</style>

</head>

<body>

<div id="loginScreen" class="login">

<h3>Leon Vendas</h3>

<input id="user" placeholder="Usuário">

<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="app" style="display:none">

<header>

<h1>Leon Vendas</h1>

<p>Sistema de Controle de iPhones</p>

</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>

<button onclick="show('estoque')">Estoque</button>

<button onclick="show('entrada')">Entrada Lote</button>

<button onclick="show('scanner')">Scanner IMEI</button>

<button onclick="show('venda')">Venda</button>

<button onclick="show('financeiro')">Financeiro</button>

<button onclick="logout()">Sair</button>

</nav>

<section id="dashboard" class="active">

<h3>Resumo</h3>

<div class="card" id="stats"></div>

</section>

<section id="estoque">

<h3>Estoque</h3>

<input id="buscaImei" placeholder="Buscar IMEI" onkeyup="buscar()">

<table>

<thead>

<tr>
<th>Modelo</th>
<th>Capacidade</th>
<th>IMEI</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="estoqueBody"></tbody>

</table>

</section>

<section id="entrada">

<h3>Entrada de Lote</h3>

<input id="modelo" placeholder="Modelo">

<input id="capacidade" placeholder="Capacidade">

<textarea id="listaImei" rows="6" placeholder="IMEIs (1 por linha)"></textarea>

<button onclick="importar()">Importar IMEIs</button>

</section>

<section id="scanner">

<h3>Scanner de IMEI</h3>

<div id="reader"></div>

<button onclick="startScanner()">Iniciar câmera</button>

</section>

<section id="venda">

<h3>Registrar Venda</h3>

<input id="imeiVenda" placeholder="buscar imei" onkeyup="buscarImeiVenda()">

<div id="resultadoBusca"></div>

<input id="clienteVenda" placeholder="Cliente">

<input id="valorVenda" placeholder="Valor">

<button onclick="vender()">Registrar</button>

</section>

<section id="financeiro">

<h3>Financeiro</h3>

<div id="caixaTotal"></div>

<table>

<thead>

<tr>
<th>Data</th>
<th>Cliente</th>
<th>IMEI</th>
<th>Valor</th>
<th>Ação</th>
</tr>

</thead>

<tbody id="financeBody"></tbody>

</table>

</section>

</div>

<script>

let estoque = JSON.parse(localStorage.getItem("estoque")||"[]")
let vendas = JSON.parse(localStorage.getItem("vendas")||"[]")

let scanner

function formatarMoeda(valor){

let numero = valor.replace(/\./g,"").replace(",",".")
numero = parseFloat(numero)

if(isNaN(numero)) return "0,00"

return numero.toLocaleString("pt-BR",{minimumFractionDigits:2, maximumFractionDigits:2})

}

function login(){

document.getElementById("loginScreen").style.display="none"
document.getElementById("app").style.display="block"

render()

}

function logout(){

document.getElementById("app").style.display="none"
document.getElementById("loginScreen").style.display="block"

}

function save(){

localStorage.setItem("estoque",JSON.stringify(estoque))
localStorage.setItem("vendas",JSON.stringify(vendas))

render()

}

function imeiExiste(imei){

return estoque.some(p => p.imei===imei)

}

function importar(){

let modelo=document.getElementById("modelo").value
let cap=document.getElementById("capacidade").value

let lista=document.getElementById("listaImei").value.split("\\n")

lista.forEach(i=>{

let imei=i.trim()

if(!imei) return

if(!imeiExiste(imei)){

estoque.push({
modelo:modelo,
cap:cap,
imei:imei,
status:"Estoque"
})

}else{

alert("IMEI duplicado: "+imei)

}

})

save()

}

function startScanner(){

scanner = new Html5Qrcode("reader")

scanner.start(

{ facingMode: "environment" },

{ fps:10, qrbox:200 },

(decodedText)=>{

let codigo = decodedText.trim()

if(!/^[0-9]+$/.test(codigo)) return
if(!codigo.startsWith("35")) return
if(codigo.length!==15) return

if(imeiExiste(codigo)){

scanner.stop()
alert("IMEI já cadastrado")

return

}

estoque.push({
modelo:"Scanner",
cap:"",
imei:codigo,
status:"Estoque"
})

save()

scanner.stop()

alert("IMEI cadastrado com sucesso: "+codigo)

}

)

}

function vender(){

let imei=document.getElementById("imeiVenda").value

let cliente=document.getElementById("clienteVenda").value

let valorBruto=document.getElementById("valorVenda").value

let valor=formatarMoeda(valorBruto)

let aparelho = estoque.find(p=>p.imei===imei)

if(!aparelho){

alert("imei nao encontrado")
return

}

aparelho.status="Vendido"

vendas.push({

imei:imei,
cliente:cliente,
valor:valor,
data:new Date().toLocaleDateString()

})

save()

alert("venda concluida com sucesso")

}

function cancelarVenda(i){

let venda=vendas[i]

let aparelho = estoque.find(p=>p.imei===venda.imei)

if(aparelho){

aparelho.status="Estoque"

}

vendas.splice(i,1)

save()

}

function buscar(){

let busca=document.getElementById("buscaImei").value

let linhas=document.querySelectorAll("#estoqueBody tr")

linhas.forEach(l=>{

if(l.innerText.includes(busca)){
l.style.display=""
}else{
l.style.display="none"
}

})

}

function render(){

let tb=document.getElementById("estoqueBody")

if(tb){

tb.innerHTML=""

estoque.forEach((p,i)=>{

tb.innerHTML+=`

<tr>

<td>${p.modelo}</td>

<td>${p.cap}</td>

<td>${p.imei}</td>

<td>${p.status}</td>

<td>

<button onclick="excluir(${i})">Excluir</button>

</td>

</tr>

`

})

}

let total=0

let fb=document.getElementById("financeBody")

if(fb){

fb.innerHTML=""

vendas.forEach((v,i)=>{

let numero = parseFloat(v.valor.replace(/\./g,"").replace(",","."))
total+=numero

fb.innerHTML+=`

<tr>

<td>${v.data}</td>

<td>${v.cliente}</td>

<td>${v.imei}</td>

<td>R$ ${v.valor}</td>

<td>

<button onclick="cancelarVenda(${i})">Cancelar</button>

</td>

</tr>

`

})

}

document.getElementById("caixaTotal").innerHTML="Caixa total: R$ "+total.toLocaleString("pt-BR",{minimumFractionDigits:2})

let estoqueQtd=estoque.filter(x=>x.status==="Estoque").length
let vendidos=estoque.filter(x=>x.status==="Vendido").length

document.getElementById("stats").innerHTML="Em estoque: "+estoqueQtd+" | Vendidos: "+vendidos

}

function excluir(i){

if(confirm("Excluir aparelho?")){

estoque.splice(i,1)

save()

}

}

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

render()

</script>

</body>
</html>
